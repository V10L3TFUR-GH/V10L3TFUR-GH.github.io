<head>

  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;800&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #0e0e1a;
      --purple: #8b3cf7;
      --purple-dim: #5a1fb8;
      --purple-glow: rgba(139, 60, 247, 0.18);
      --text: #e8e0ff;
      --muted: #6b6488;
      --border: rgba(139, 60, 247, 0.2);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow-x: hidden;
    }

    /* ── Animated background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(139,60,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,60,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Radial glow blob ── */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(139,60,247,0.15) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.08); }
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.8s ease both;
    }

    .handle {
      font-family: 'Oxanium', sans-serif;
      font-weight: 800;
      font-size: clamp(2.2rem, 8vw, 4rem);
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #c084fc 0%, #8b3cf7 50%, #6d28d9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(139,60,247,0.5));
      line-height: 1.1;
    }

    .tagline {
      margin-top: 0.6rem;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
      margin: 0 auto 2.5rem;
      animation: fadeDown 0.8s 0.1s ease both;
    }

    /* ── Links ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
      animation: fadeUp 0.6s ease both;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--purple-glow), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .link-card:hover {
      border-color: var(--purple);
      transform: translateX(4px);
      box-shadow: 0 0 20px rgba(139,60,247,0.2), inset 0 0 20px rgba(139,60,247,0.03);
    }

    .link-card:hover::before { opacity: 1; }

    /* staggered fade-in */
    .link-card:nth-child(1) { animation-delay: 0.3s; }
    .link-card:nth-child(2) { animation-delay: 0.4s; }
    .link-card:nth-child(3) { animation-delay: 0.5s; }
    .link-card:nth-child(4) { animation-delay: 0.6s; }
    .link-card:nth-child(5) { animation-delay: 0.7s; }
    .link-card:nth-child(6) { animation-delay: 0.8s; }

    .icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      background: rgba(139,60,247,0.12);
      border: 1px solid rgba(139,60,247,0.25);
    }

    .icon svg {
      width: 18px;
      height: 18px;
      fill: var(--purple);
    }

    .link-info {
      flex: 1;
    }

    .link-platform {
      font-family: 'Oxanium', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .link-handle {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 1px;
      letter-spacing: 0.04em;
    }

    .arrow {
      color: var(--purple-dim);
      font-size: 0.9rem;
      transition: color 0.3s, transform 0.3s;
    }

    .link-card:hover .arrow {
      color: var(--purple);
      transform: translateX(3px);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 2.5rem;
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: fadeUp 0.6s 1s ease both;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
